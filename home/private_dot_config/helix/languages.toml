[language-server.docker-language-server]
command = "docker-language-server"
args = ["start", "--stdio"]

[language-server.rust-analyzer]
config.imports.granularity.group = "module"

[[language]]
name = "dockerfile"
language-servers = ["docker-language-server"]

[[language]]
name = "pkl"
auto-format = true

[[language]]
name = "toml"
auto-format = true
